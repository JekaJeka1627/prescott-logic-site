<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Work - Prescott11</title>
  <meta name="description" content="Work area for Prescott11." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="canonical" href="https://prescott11.com/login.html" />
  <link rel="icon" href="images/favicon.ico" sizes="any" />
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --pl-bg: #0b1020;
      --pl-bg-2: #0e1428;
      --pl-amber: #ffae00;
      --pl-amber-soft: #ffd54f;
      --pl-text: #eaeff7;
      --pl-muted: #99a3b3;
      --pl-stroke: rgba(255, 213, 79, 0.18);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      color: var(--pl-text);
      background:
        radial-gradient(1200px 600px at 20% 100%, rgba(122,60,255,0.25), transparent 60%),
        radial-gradient(800px 500px at 80% 0%, rgba(34,211,238,0.2), transparent 55%),
        linear-gradient(180deg, var(--pl-bg-2) 0%, var(--pl-bg) 30%, #090e1a 100%);
      background-attachment: fixed;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 80;
      backdrop-filter: blur(10px);
      background: rgba(11,16,32,0.72);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      width: min(1100px, calc(100vw - 40px));
      margin: 0 auto;
      padding: 14px 0;
    }

    .brand {
      font-family: Orbitron, Inter, sans-serif;
      color: var(--pl-amber-soft);
      font-weight: 700;
      letter-spacing: 0.12em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .links {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .links a,
    .neon-text {
      color: var(--pl-amber-soft);
      text-shadow:
        0 0 4px rgba(255,185,80,0.75),
        0 0 10px rgba(255,120,0,0.55),
        0 0 22px rgba(255,120,0,0.45);
    }

    .links a {
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
    }

    .links a:hover { background: rgba(255,255,255,0.06); }

    main {
      min-height: calc(100vh - 57px);
      display: grid;
      place-items: center;
      padding: 58px 20px 72px;
    }

    .login-panel {
      width: min(420px, calc(100vw - 40px));
      max-width: 100%;
      min-width: 0;
      padding: 34px;
      border: 1px solid var(--pl-stroke);
      border-radius: 18px;
      background:
        radial-gradient(360px 180px at 50% 0%, rgba(255, 174, 0, 0.14), transparent 70%),
        rgba(255,255,255,0.035);
      box-shadow: 0 0 0 2px rgba(255,174,0,0.06) inset, 0 18px 60px rgba(0,0,0,0.38);
    }

    h1 {
      margin: 0 0 10px;
      font-family: Orbitron, Inter, sans-serif;
      font-size: clamp(24px, 6vw, 34px);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .subhead {
      margin: 0 0 28px;
      color: var(--pl-muted);
      line-height: 1.55;
      text-align: center;
    }

    label {
      display: block;
      margin: 18px 0 8px;
      color: var(--pl-amber-soft);
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      min-height: 48px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      color: var(--pl-text);
      background: rgba(3, 7, 18, 0.58);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: rgba(255, 213, 79, 0.55);
      box-shadow: 0 0 0 3px rgba(255, 213, 79, 0.12);
    }

    button,
    .secondary-link {
      width: 100%;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 22px;
      border-radius: 999px;
      font-weight: 700;
      text-decoration: none;
    }

    button {
      border: 0;
      color: #0b0b0b;
      background: linear-gradient(90deg, #ff2d92, var(--pl-amber));
      box-shadow: 0 0 22px rgba(255,45,146,0.45), 0 0 44px rgba(255,174,0,0.3);
      cursor: pointer;
    }

    .secondary-link {
      color: var(--pl-amber-soft);
      border: 1px solid rgba(255, 213, 79, 0.28);
      background: rgba(255,255,255,0.035);
    }

    .notice {
      min-height: 22px;
      margin: 14px 0 0;
      color: var(--pl-muted);
      font-size: 0.92rem;
      line-height: 1.45;
      text-align: center;
    }

    @media (max-width: 640px) {
      body { background-attachment: scroll; }

      .nav-inner {
        width: min(100%, calc(100vw - 28px));
        flex-direction: column;
        justify-content: center;
        gap: 8px;
        padding: 12px 0;
      }

      .brand {
        font-size: 0.85rem;
        text-align: center;
      }

      .links {
        gap: 4px;
        justify-content: center;
        width: 100%;
      }

      .links a {
        padding: 8px 7px;
        font-size: 0.95rem;
      }

      main {
        padding: 38px 16px 54px;
      }

      .login-panel {
        width: min(300px, calc(100vw - 32px));
        padding: 26px 20px;
        border-radius: 16px;
      }

      h1 {
        font-size: clamp(20px, 6.4vw, 25px);
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html">Prescott11</a>
      <div class="links">
        <a href="login.html">Work</a>
        <a href="index.html#about">About</a>
        <a href="index.html#contact">Contact</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="login-panel" aria-labelledby="login-title">
      <h1 id="login-title" class="neon-text">Work</h1>

      <form id="login-form">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" />

        <button type="submit">Sign In</button>
        <p class="notice" id="login-notice" aria-live="polite"></p>
      </form>

      <a class="secondary-link" href="mailto:hello@prescott11.com">Request Access</a>
    </section>
  </main>

  <script>
    document.getElementById("login-form").addEventListener("submit", function (event) {
      event.preventDefault();
      document.getElementById("login-notice").textContent = "Access is by invitation.";
    });
  </script>
</body>
</html>
